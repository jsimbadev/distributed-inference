name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  refresh-lock:
    name: Refresh lockfile
    if: github.event_name == 'pull_request' && github.head_ref == 'agent/add-ci-quality-tests-docs'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Install uv and Python
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.11"

      - name: Regenerate lockfile
        run: uv lock

      - name: Commit refreshed lockfile
        run: |
          if git diff --quiet -- uv.lock; then
            echo "Lockfile is already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add uv.lock
          git commit -m "chore: refresh lockfile for Python 3.11"
          git push origin HEAD:${{ github.head_ref }}

  quality:
    name: Quality
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv and Python
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
          python-version: "3.11"

      - name: Install development environment
        run: uv sync --group dev --python 3.11

      - name: Run pre-commit checks
        run: uv run pre-commit run --all-files

  tests:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv and Python
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
          python-version: ${{ matrix.python-version }}

      - name: Install development environment
        run: uv sync --group dev --python ${{ matrix.python-version }}

      - name: Run unit tests
        run: uv run pytest

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv and Python
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
          python-version: "3.11"

      - name: Install documentation environment
        run: uv sync --group dev --python 3.11

      - name: Build documentation
        run: uv run sphinx-build -W --keep-going -b html docs docs/_build/html

      - name: Upload rendered documentation
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: documentation-html
          path: docs/_build/html
          if-no-files-found: ignore
          retention-days: 7
