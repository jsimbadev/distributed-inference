name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv and Python
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
          python-version: "3.11"

      - name: Install development environment
        run: uv sync --locked --group dev --python 3.11

      - name: Collect changed Python files
        id: changed-python
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
            git diff --name-only --diff-filter=ACMR -z "$base" "$head" -- '*.py' '*.pyi' > changed-python-files
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            base="${{ github.event.before }}"
            head="${{ github.sha }}"
            git diff --name-only --diff-filter=ACMR -z "$base" "$head" -- '*.py' '*.pyi' > changed-python-files
          else
            git ls-files -z -- '*.py' '*.pyi' > changed-python-files
          fi

          if [[ -s changed-python-files ]]; then
            echo "has-files=true" >> "$GITHUB_OUTPUT"
          else
            echo "has-files=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Ruff linting
        if: steps.changed-python.outputs.has-files == 'true'
        shell: bash
        run: |
          mapfile -d '' files < changed-python-files
          uv run ruff check "${files[@]}"

      - name: Check Ruff formatting
        if: steps.changed-python.outputs.has-files == 'true'
        shell: bash
        run: |
          mapfile -d '' files < changed-python-files
          uv run ruff format --check "${files[@]}"

      - name: Run ty type checking
        if: steps.changed-python.outputs.has-files == 'true'
        shell: bash
        run: |
          mapfile -d '' files < changed-python-files
          uv run ty check "${files[@]}"

      - name: Report no changed Python files
        if: steps.changed-python.outputs.has-files != 'true'
        run: echo "No changed Python files require quality checks."

  tests:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv and Python
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
          python-version: ${{ matrix.python-version }}

      - name: Install development environment
        run: uv sync --locked --group dev --python ${{ matrix.python-version }}

      - name: Run unit tests
        run: uv run pytest

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv and Python
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
          python-version: "3.11"

      - name: Install documentation environment
        run: uv sync --locked --group dev --python 3.11

      - name: Build documentation
        run: uv run sphinx-build -W -b html docs docs/_build/html

      - name: Upload rendered documentation
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: documentation-html
          path: docs/_build/html
          if-no-files-found: ignore
          retention-days: 7
