name: Refresh lockfile

on:
  push:
    branches: ["agent/**"]

permissions:
  contents: write

jobs:
  refresh-lock:
    name: Refresh lockfile
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: agent/add-ci-quality-tests-docs

      - name: Install uv and Python
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.11"

      - name: Regenerate lockfile
        run: uv lock

      - name: Commit refreshed lockfile
        run: |
          if git diff --quiet -- uv.lock; then
            echo "Lockfile is already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add uv.lock
          git commit -m "chore: refresh lockfile for Python 3.11"
          git push origin HEAD:agent/add-ci-quality-tests-docs
